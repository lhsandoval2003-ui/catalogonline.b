<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* -----------------------------------------
           1. VARIABLES Y CONFIGURACIÓN GENERAL
        ----------------------------------------- */
        :root {
            --bg-color: #0b0b0c;
            --surface-color: #16161a;
            --surface-hover: #222227;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-color: #25d366; /* Verde WhatsApp / Acento */
            --accent-hover: #20ba5a;
            --price-color: #4ade80;
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* -----------------------------------------
           2. HEADER
        ----------------------------------------- */
        header {
            text-align: center;
            margin-bottom: 3.5rem;
            animation: fadeIn Down 0.8s ease;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* -----------------------------------------
           3. GRID DE PRODUCTOS
        ----------------------------------------- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            animation: fadeInUps 0.8s ease;
        }

        /* Tarjeta de Producto */
        .product-card {
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: var(--transition);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.7);
        }

        /* Contenedor de Imagen y Badge */
        .image-container {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Relación de aspecto 1:1 (Cuadrado) */
            overflow: hidden;
            background-color: #1e1e24;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(11, 11, 12, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
        }

        /* Detalles del Producto */
        .product-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
            color: var(--text-main);
        }

        .product-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--price-color);
            margin-top: auto;
            margin-bottom: 1.2rem;
        }

        /* Botón de Compra */
        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--accent-color);
            color: #000000;
            text-decoration: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: var(--transition);
            text-align: center;
        }

        .btn-whatsapp:hover {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }

        .btn-whatsapp svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* -----------------------------------------
           4. BOTÓN FLOTANTE WSP
        ----------------------------------------- */
        .btn-floating {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: var(--accent-color);
            color: #000;
            width: 56px;
            height: 56px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.3);
            z-index: 999;
            transition: var(--transition);
        }

        .btn-floating:hover {
            transform: scale(1.1) rotate(8deg);
            background-color: var(--accent-hover);
        }

        .btn-floating svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        /* -----------------------------------------
           5. ANIMACIONES Y RESPONSIVE
        ----------------------------------------- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes contentUps {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .products-grid {
            animation: contentUps 0.9s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 480px) {
            header h1 { font-size: 2rem; }
            .container { padding: 1.5rem 1rem; }
            .products-grid { gap: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="shop-title">Elegance Store</h1>
            <p id="shop-subtitle">Catálogo Exclusivo • Envíos Rápidos a todo el país</p>
        </header>

        <main class="products-grid" id="grid-productos">
            </main>
    </div>

    <a href="#" id="wsp-global" class="btn-floating" target="_blank" aria-label="Contacto general por WhatsApp">
        <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.498 1.451 5.44 1.452 5.4 0 9.794-4.394 9.796-9.793 0-2.614-1.017-5.071-2.865-6.922-1.848-1.85-4.306-2.868-6.92-2.869-5.404 0-9.802 4.394-9.805 9.794-.001 1.97.514 3.893 1.496 5.493l-.992 3.623 3.714-.974zm11.232-4.13c-.302-.15-.1.79-.1.25s-.377-.425-.63-.55c-.252-.125-1.493-.615-1.953-.827-.46-.21-.794-.314-1.128.188-.334.502-1.296 1.632-1.589 1.966-.294.335-.588.376-.89.225-.302-.15-1.273-.47-2.425-1.494-.897-.8-1.502-1.787-1.678-2.088-.176-.302-.019-.465.13-.614.136-.135.302-.35.454-.526.15-.175.2-.301.302-.502.102-.2.05-.376-.025-.526-.075-.15-.627-1.512-.86-2.072-.226-.546-.477-.473-.654-.482t-.36-.01c-.127 0-.335.049-.512.242-.177.194-.675.66-0.675 1.608 0 .949.69 1.867.787 2.001.096.133 1.357 2.071 3.287 2.903.459.198.817.316 1.097.405.461.147.88.126 1.212.077.37-.055 1.128-.462 1.285-.908.156-.447.156-.831.109-.911-.048-.08-.176-.125-.478-.275z"/></svg>
    </a>

    <script>
        // TELEFONO DE LA TIENDA (Código de país + número, sin espacios ni símbolos "+")
        // Ejemplo Nicaragua: "50588888888"
        const WHATSAPP_PHONE = "50588888888"; 

        // CONFIGURACIÓN DE MENSAJE GLOBAL (Para el botón flotante)
        const GLOBAL_MESSAGE = "Hola, estoy visitando su catálogo online y me gustaría hacer una consulta.";

        // LISTA DE PRODUCTOS (Fácil de editar en menos de 5 minutos)
        const PRODUCTOS = [
            {
                id: 1,
                nombre: "Smartwatch Ultra Series 9",
                precio: 1450,
                imagen: "https://images.unsplash.com/photo-1434494878577-86c23bcb06b9?auto=format&fit=crop&w=600&q=80",
                badge: "🔥 Oferta",
                meta: "Stock Limitado • Envío gratis"
            },
            {
                id: 2,
                nombre: "Auriculares Inalámbricos Pro",
                precio: 850,
                imagen: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=600&q=80",
                badge: "⭐ Más vendido",
                meta: "Calidad Premium de Audio"
            },
            {
                id: 3,
                nombre: "Gafas de Sol Aviador Black",
                precio: 620,
                imagen: "https://images.unsplash.com/photo-1511499767150-a48a237f0083?auto=format&fit=crop&w=600&q=80",
                badge: "🚀 Nuevo",
                meta: "Protección UV400 certificada"
            },
            {
                id: 4,
                nombre: "Perfume Bleu de Chanel Masculino",
                precio: 3200,
                imagen: "https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=600&q=80",
                badge: "💸 Rebaja",
                meta: "100% Original Garantizado"
            },
            {
                id: 5,
                nombre: "Billetera Minimalista de Cuero",
                precio: 450,
                imagen: "https://images.unsplash.com/photo-1627123424574-724758594e93?auto=format&fit=crop&w=600&q=80",
                badge: "", // Sin etiqueta
                meta: "Entrega Inmediata"
            },
            {
                id: 6,
                nombre: "Mochila Impermeable para Laptop",
                precio: 1100,
                imagen: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=600&q=80",
                badge: "⚡ Recomendado",
                meta: "Con puerto de carga USB integrado"
            }
        ];

        // FUNCIÓN PARA RENDERIZAR LOS PRODUCTOS AUTOMÁTICAMENTE
        function cargarCatalogo() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = ''; // Limpiar contenedor

            PRODUCTOS.forEach(prod => {
                // Generar mensaje personalizado para WhatsApp codificado para URL
                const textoMensaje = encodeURIComponent(`Hola, quiero más información sobre el producto: *${prod.nombre}* (Precio: C$${prod.precio.toLocaleString()})`);
                const urlWhatsapp = `https://wa.me/${WHATSAPP_PHONE}?text=${textoMensaje}`;

                // Manejo de la etiqueta (Badge) si existe
                const badgeHTML = prod.badge ? `<span class="badge">${prod.badge}</span>` : '';

                // Estructura HTML de la tarjeta
                const card = document.createElement('article');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="image-container">
                        ${badgeHTML}
                        <img class="product-image" src="${prod.imagen}" alt="${prod.nombre}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <h2 class="product-name">${prod.nombre}</h2>
                        <div class="product-meta">${prod.meta}</div>
                        <div class="product-price">C$ ${prod.precio.toLocaleString()}</div>
                        <a href="${urlWhatsapp}" target="_blank" class="btn-whatsapp">
                            <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.498 1.451 5.44 1.452 5.4 0 9.794-4.394 9.796-9.793 0-2.614-1.017-5.071-2.865-6.922-1.848-1.85-4.306-2.868-6.92-2.869-5.404 0-9.802 4.394-9.805 9.794-.001 1.97.514 3.893 1.496 5.493l-.992 3.623 3.714-.974zm11.232-4.13c-.302-.15-.1.79-.1.25s-.377-.425-.63-.55c-.252-.125-1.493-.615-1.953-.827-.46-.21-.794-.314-1.128.188-.334.502-1.296 1.632-1.589 1.966-.294.335-.588.376-.89.225-.302-.15-1.273-.47-2.425-1.494-.897-.8-1.502-1.787-1.678-2.088-.176-.302-.019-.465.13-.614.136-.135.302-.35.454-.526.15-.175.2-.301.302-.502.102-.2.05-.376-.025-.526-.075-.15-.627-1.512-.86-2.072-.226-.546-.477-.473-.654-.482t-.36-.01c-.127 0-.335.049-.512.242-.177.194-.675.66-0.675 1.608 0 .949.69 1.867.787 2.001.096.133 1.357 2.071 3.287 2.903.459.198.817.316 1.097.405.461.147.88.126 1.212.077.37-.055 1.128-.462 1.285-.908.156-.447.156-.831.109-.911-.048-.08-.176-.125-.478-.275z"/></svg>
                            Consultar por WhatsApp
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Configurar el botón flotante global
            const floatingWsp = document.getElementById('wsp-global');
            floatingWsp.href = `https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(GLOBAL_MESSAGE)}`;
        }

        // Ejecutar carga al abrir la página
        document.addEventListener('DOMContentLoaded', cargarCatalogo);
    </script>
</body>
</html>
